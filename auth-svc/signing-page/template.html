<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Web3 Auth</title>
<style>
:root {
    --primary: {{PRIMARY_COLOR}};
    --primary-dark: color-mix(in srgb, var(--primary) 80%, black);
    --bg: #0a0a0a;
    --surface: #1a1a1a;
    --text: #e0e0e0;
    --text-muted: #888;
    --border: #333;
    --success: #22c55e;
    --error: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.container {
    max-width: 480px;
    width: 100%;
    background: var(--surface);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
}
h1 { font-size: 1.25rem; margin-bottom: 16px; color: #fff; }
label { display: block; margin-bottom: 6px; font-size: .875rem; color: var(--text-muted); }
input {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: #fff;
    font-size: 1rem;
    margin-bottom: 16px;
    font-family: inherit;
}
input:focus { outline: none; border-color: var(--primary); }
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: background .2s;
}
button.disabled, button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
button.loading {
    opacity: 0.7;
    cursor: wait;
}
.active { border-color: var(--primary); }
.completed { border-color: var(--success); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled):not(.loading) { background: var(--primary-dark); }
.btn-secondary { background: #4b5563; color: #fff; margin-top: 8px; }
.btn-secondary:hover:not(:disabled) { background: #374151; }
.btn-copy { background: var(--success); color: #fff; margin-top: 8px; }
.btn-copy:hover { background: #16a34a; }
.result {
    margin-top: 16px;
    padding: 12px;
    background: var(--bg);
    border-radius: 8px;
    word-break: break-all;
    font-family: monospace;
    font-size: .75rem;
    max-height: 120px;
    overflow-y: auto;
}
#status-message {
    text-align: center;
    padding: 8px;
    margin-bottom: 16px;
    border-radius: 6px;
    font-size: .875rem;
}
#status-message.error { background: #7f1d1d; color: #fca5a5; }
#status-message.success { background: #14532d; color: #86efac; }
.hidden { display: none; }
#wallet-address {
    font-size: .75rem;
    color: #666;
    margin-bottom: 16px;
    word-break: break-all;
}
.info { font-size: .75rem; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
</style>
</head>
<body>
<div class="container">
<h1>Web3 Authentication</h1>
<div id="status-message" class="hidden"></div>

<div id="step-connect">
<p class="info">Sign in to your server using your Ethereum wallet. Connect your wallet to get started.</p>
<button id="btn-connect" class="btn-primary">Connect Wallet</button>
</div>

<div id="step-sign" class="hidden">
<div id="wallet-address"></div>

<div id="sign-form">
<label for="code">Enter OTP Code</label>
<input type="text" id="code" placeholder="123456" maxlength="8" autocomplete="off">
<label for="machine">Machine ID</label>
<input type="text" id="machine" placeholder="server-prod-01" autocomplete="off">
<button id="btn-sign" class="btn-primary">Sign Message</button>
</div>

<div id="sign-result" class="hidden">
<label>Signature (paste this in terminal)</label>
<div id="sig" class="result"></div>
<button id="copy-sig" class="btn-copy">Copy to Clipboard</button>
<button id="reset-sign" class="btn-secondary">Sign Another</button>
</div>
</div>
</div>

<script>
var CONFIG = {
    publicSecret: '{{PUBLIC_SECRET}}',
    serverPublicKey: '{{SERVER_PUBLIC_KEY}}',
    rpcUrl: '{{RPC_URL}}',
    nftContract: '{{NFT_CONTRACT}}',
    subscriptionContract: '{{SUBSCRIPTION_CONTRACT}}',
    chainId: '{{CHAIN_ID}}',
};
</script>
<script src="engine.js"></script>
</body>
</html>
